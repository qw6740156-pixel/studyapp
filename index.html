<!DOCTYPE html>
<html>

<head>

  <title>Study Timer</title>

  <meta name="viewport"
    content="width=device-width, initial-scale=1">

  <style>

    body {

      font-family: Arial;

      text-align: center;

      padding: 20px;

      background: white;

      color: black;

      transition: 0.3s;
    }

    .dark {

      background: #111;

      color: white;
    }

    h1 {

      font-size: 40px;
    }

    #timer {

      font-size: 60px;

      margin: 20px;
    }

    input {

      padding: 10px;

      width: 120px;

      font-size: 18px;

      text-align: center;

      margin: 5px;
    }

    button {

      padding: 14px 20px;

      margin: 8px;

      border: none;

      border-radius: 12px;

      font-size: 18px;
    }

    #progress-container {

      width: 100%;

      background: #ccc;

      height: 25px;

      border-radius: 20px;

      margin-top: 20px;
    }

    #progress-bar {

      width: 100%;

      height: 25px;

      background: green;

      border-radius: 20px;
    }

  </style>

</head>

<body>

  <h1>Study Timer</h1>

  <p>Study Minutes</p>

  <input
    id="minutes"
    type="number"
    value="25">

  <br><br>

  <p>Break Minutes</p>

  <input
    id="breakMinutes"
    type="number"
    value="5">

  <p id="timer">25:00</p>

  <p id="mode">Study Mode</p>

  </p>

<p id="sessions">
  Completed Sessions: 0
</p>

<p id="studyTime">
  Total Study Today: 0 min
</p>

  <div id="progress-container">

    <div id="progress-bar"></div>

  </div>

  <br>

  <button onclick="startTimer()">
    Start
  </button>

  <button onclick="pauseTimer()">
    Pause
  </button>

  <button onclick="resetTimer()">
    Reset
  </button>

  <button onclick="toggleDarkMode()">
    Dark Mode
  </button>

 <audio id="bellSound" src="bell.mp3"></audio>

  <script src="script.js"></script>

</body>

</html>
